<!DOCTYPE html>
<html>
<head>
    <title>  CricketGame </title>
    <link rel="stylesheet" href="updatedCricket.css">
</head>
<body>
  <h1 id="header12">Bat Ball Stump Game</h1>

  

  <button  class="choice-button" onclick="
  let computerChoice=generateComputerChoice();
  let resultMsg= getResult('Bat', computerChoice);
  showResult('Bat', computerChoice, resultMsg);
  "><img src="IMGcricket/bat.png" alt="Bat-image" class="choice-image">
  </button>

  <button  class="choice-button" onclick=" computerChoice=generateComputerChoice();
  resultMsg=getResult('Ball', computerChoice);
  showResult('Ball', computerChoice, resultMsg);
  "><img src="IMGcricket/ball.png" alt="Ball-image" class="choice-image">
  </button>

  <button  class="choice-button" onclick=" computerChoice=generateComputerChoice();
  resultMsg=getResult('Stump', computerChoice);
  showResult('Stump', computerChoice, resultMsg);
  
  "><img src="IMGcricket/stump.png" alt="Stump-img" class="choice-image">
  </button>

  

  <h3 id="user-move"></h3> 
  <h3 id="computer-move"></h3>
  <h3 id="result"></h3>
  <h3 id="score"></h3>

  <button class="reset-button" onclick="localStorage.clear()
  resetScore(); 
  "> Reset </button>

  <script>
    let scoreStr=localStorage.getItem('Score');
    let  score;
    resetScore(scoreStr);

    function resetScore(scoreStr){
      score= scoreStr? JSON.parse(scoreStr): {
      win: 0,
      lost:0,
      tie: 0,
    };
    
      score.displayScore=  function(){ 
        return `score: won: ${score.win}, lost: ${score.lost}, tie: ${score.tie}`;
      };

      showResult();

    }

    function generateComputerChoice(){
      let randomNumber=Math.random()*3;
      if(randomNumber>0 && randomNumber<=1){
        return 'Bat';
      }else if(randomNumber>1 && randomNumber<=2){
        return 'Ball';
      }else{
        return 'Stump';
      }
    }

    function getResult(userMove, computerMove){
      if(userMove==='Bat'){
        if(computerMove==='Ball'){
          score.win++;
          return 'User won.'

        }else if(computerMove==='Bat'){
          score.tie++;
          return `it's a tie.`;

        }else if(computerMove==='Stump'){
          score.lost++;
          return 'Computer has won.';
        }
      }else if(userMove==='Ball'){
        if(computerMove==='Ball'){
          score.tie++;
          return `it's a tie.`;
        }else if(computerMove==='Bat'){
          score.lost++;
          return 'Computer has won';
        }else if(computerMove==='Stump'){
          score.win++;
          return 'User won.';
        }
      }else{
        if(userMove==='Stump'){
          if(computerMove==='Stump'){
            score.tie++;
            return `it's a tie.`
          }else if(computerMove==='Ball'){
            score.lost++;
            return 'Computer has won';
          }else if(computerMove==='Bat'){
            score.win++;
            return 'User won.';

          }
        }
      }
    }

    function showResult(userMove,computerMove,result){
      localStorage.setItem('Score',JSON.stringify(score));
      document.querySelector('#user-move').innerText=userMove? `You have choosen ${userMove}`:'';

      document.querySelector('#computer-move').innerText=computerMove? `computer choice is ${computerMove} `:''; // ('')=> Empty String

      document.querySelector('#result').innerText=result||
      '';
      document.querySelector('#score').innerText=score.displayScore();

      
    }
  </script>
</body>
</html>
