<body>
<h1>Bat Ball Stump Game</h1>
<button onclick="
    generateComputerChoice();
    let resultMsg;
    if(computerChoice==='Bat'){
      resultMsg='Match is tie';

    }
    else if(computerChoice==='Ball'){
      resultMsg='User won the Match';

    }
    else if(computerChoice==='Stump'){
      resultMsg='Computer has won';

    alert(`You have choosen Bat.computerChoice is ${computerChoice} and ${resultMsg}`);
  
  ">Bat</button>



    <button onclick=" 
    generateComputerChoice();
    let resultMsg;
    if(computerChoice==='Ball'){
      resultMsg='Match is tie';

    }
    else if(computerChoice==='Bat'){
      resultMsg='computer has won';

    }
    else if(computerChoice==='Stump'){
      resultMsg='user won the match';

    }
    alert(`You have choosen Ball. computerChoice is ${computerChoice} and ${resultMsg}`);
    
    ">Ball</button>

    <button onclick="
    generateComputerChoice();
    let  resultMsg;
    if(computerChoice==='Ball'){
      resultMsg='Computer won match';

    }
    else if(computerChoice==='Bat'){
      resultMsg='user won the match';

    }
    else if(computerChoice==='Stump'){
      resultMsg='Match is tie';

    }
    alert(`You have choosen Stump. computerChoice is ${computerChoice} and ${resultMsg}`);

    ">Stump</button> 


  <script>
    let computerChoice;
    function generateComputerChoice() {     
  // This will generate random number between o to 1
  let randomNumber= Math.random() * 3;
  
  
  if(randomNumber>0 && randomNumber<=1 ){
      computerChoice= 'Bat';
  }
  else if(randomNumber>1 && randomNumber<=2){
      computerChoice='Ball';
  }
  else{
    computerChoice='Stump';   
  }
    }
  </script>
